<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Names</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: rgb(40,40,40);
    --surface: #18181c;
    --surface2: #222228;
    --surface3: #2c2c35;
    --border: #333340;
    --text: #e8e8f0;
    --text-muted: #888898;
    --text-dim: #555565;
    --accent: #7c6fcd;
    --accent-hover: #9b8fe0;
    --good: #4caf82;
    --radius: 8px;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; min-height:100vh; }

  /* HEADER */
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; flex:1; justify-content:center; }
  .logo-text { font-size:20px; font-weight:600; color:var(--text); }
  .stat-pill { margin-left:auto; display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:3px 13px; font-size:13px; color:var(--text-muted); }

  /* CONTROLS AREA */
  .controls { padding:16px 24px 0; display:flex; flex-direction:column; gap:12px; }

  /* Row 1: search bar alone */
  .search-wrap { position:relative; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
  #searchInput { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:0 38px; height:42px; box-sizing:border-box; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; }
  #searchInput::placeholder { color:var(--text-dim); }
  #searchInput:focus { border-color:var(--accent); }
  .clear-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:2px; display:none; align-items:center; }
  .clear-btn.visible { display:flex; }
  .clear-btn:hover { color:var(--text); }

  /* Row 2: wheel + filters */
  .filters-row {
    display:flex;
    gap:16px;
    align-items:flex-start;
  }

  /* PICKER PANEL (HWB sliders) */
  .picker-panel { display:flex; flex-direction:column; gap:8px; flex:1; }
  .picker-top { display:flex; gap:12px; align-items:stretch; }
  #pickerPreview { width:95px; aspect-ratio:1/1; border-radius:10px; border:1px solid var(--border); flex-shrink:0; }
  .picker-sliders { flex:1; display:flex; flex-direction:column; justify-content:space-between; gap:5px; }
  .slider-group { display:flex; align-items:center; gap:8px; }
  .hwb-slider {
    -webkit-appearance:none; flex:1; height:13px;
    border-radius:7px; outline:none; cursor:pointer; border:none;
  }
  .hwb-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:21px; height:21px; border-radius:50%;
    background:#fff; border:2px solid rgba(0,0,0,.18);
    box-shadow:0 1px 5px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.1);
    cursor:pointer;
  }
  .slider-num {
    font-size:12px; font-family:'SF Mono','Fira Code',monospace;
    color:var(--text-muted); min-width:28px; text-align:right;
    font-variant-numeric:tabular-nums;
  }
  .picker-hex-row { display:flex; gap:8px; align-items:center; }
  #pickerHexInput { background:none; border:none; padding:0; }

  /* Picker toggle */

  /* RIGHT SIDE: tone + good */
  .filter-options {
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-top:2px;
  }

  .bottom-filters { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .icon-btn { display:flex; align-items:center; gap:7px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:7px 12px; cursor:pointer; font-size:12px; color:var(--text-muted); transition:all .15s; user-select:none; white-space:nowrap; }
  .icon-btn:hover { border-color:var(--text-muted); color:var(--text); }
  .icon-btn.active { border-color:var(--good); color:var(--good); background:rgba(76,175,130,.08); }
  .sort-select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:0 10px; color:var(--text-muted); font-size:12px; outline:none; cursor:pointer; height:42px; box-sizing:border-box; }

  /* RESULTS BAR */
  .results-bar { padding:12px 24px 8px; display:flex; align-items:center; justify-content:space-between; }
  .results-count { font-size:12px; color:var(--text-muted); }
  .results-count span { color:var(--text); font-weight:500; }

  /* GRID */
  #grid { padding:0 24px 24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(min(220px,calc(50% - 6px)),1fr)); gap:12px; }
  .color-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:border-color .15s, transform .1s; }
  .color-card:hover { border-color:var(--text-muted); transform:translateY(-1px); }
  .swatch { height:80px; width:100%; position:relative; }
  .dist-badge { position:absolute; top:7px; left:7px; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); border-radius:4px; padding:2px 6px; font-size:10px; color:#aaa; font-family:'SF Mono','Fira Code',monospace; }
  .card-body { padding:8px 12px 10px; }
  .color-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .color-hex { font-size:11px; color:var(--accent); font-family:'SF Mono','Fira Code',monospace; font-weight:500; }

  /* DETAIL PANEL */
  #main { transition: margin-right 0.32s cubic-bezier(0.4,0,0.2,1); }
  #main.panel-open { margin-right: 300px; }
  #detailPanel {
    display:flex; flex-direction:column; overflow:hidden;
    position:fixed; right:0; top:0; bottom:0; width:300px;
    background:var(--surface); border-left:1px solid var(--border);
    z-index:200;
    transform:translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  #detailPanel.open { transform:translateX(0); }

  @media (max-width:640px) {
    #main { transition: padding-bottom 0.32s cubic-bezier(0.4,0,0.2,1); }
    #main.panel-open { margin-right:0; padding-bottom:180px; }
    #detailPanel {
      left:0; right:0; top:auto; bottom:0;
      width:100%; height:180px;
      border-left:none; border-top:1px solid var(--border);
      transform:translateY(100%);
      flex-direction:row;
    }
    #detailPanel.open { transform:translateY(0); }
    .detail-left-col { display:flex; flex-direction:column; width:100px; flex-shrink:0; align-self:stretch; }
    .detail-swatch-mobile { flex:1; }
    .copy-hex-btn-mobile { display:flex; align-items:center; justify-content:center; gap:4px; background:var(--surface2); border:none; border-top:1px solid var(--border); color:var(--text-muted); font-size:11px; padding:7px 6px; cursor:pointer; transition:all .15s; flex-shrink:0; }
    .copy-hex-btn-mobile:hover { color:var(--accent); }
    .copy-hex-btn-mobile.copied { color:var(--good); }
    .detail-content-mobile { flex:1; overflow:hidden; padding:10px 12px; }
    .copy-hex-btn { display:none !important; }
    .detail-swatch-mobile { display:block; }
  }
  .detail-swatch { height:140px; flex-shrink:0; }
  @media (max-width:640px) { .detail-swatch { display:none; } }
  .detail-content { padding:16px; overflow:hidden; flex:1; }
  @media (min-width:641px) { .detail-left-col { display:none; } }
  .detail-name { font-size:15px; font-weight:600; margin-bottom:1px; line-height:1.2; }
  .detail-name-es { font-size:11px; color:var(--text-muted); margin-bottom:8px; font-style:italic; }
  .detail-section-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin-bottom:8px; }
  .detail-values-grid { display:flex; flex-direction:column; }
  .detail-value-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
  .detail-value-row:last-child { border-bottom:none; }
  @media (max-width:640px) {
    .detail-values-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
    .detail-value-row { display:flex; flex-direction:column; gap:3px; padding:7px 9px; background:var(--surface); border-bottom:none; }
  }
  .detail-value-row:last-child { border-bottom:none; }
  .detail-val-label { font-size:12px; color:var(--text-muted); }
  .detail-val-data { font-size:12px; font-family:'SF Mono','Fira Code',monospace; color:var(--text); }
  .detail-val-data.hex-val { color:var(--accent); font-weight:600; }
  .copy-hex-btn { width:100%; margin-top:8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px; color:var(--text-muted); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
  .copy-hex-btn:hover { border-color:var(--accent); color:var(--accent); }
  .copy-hex-btn.copied { border-color:var(--good); color:var(--good); }
  .close-detail { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.45); border:none; color:#fff; width:28px; height:28px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; z-index:1; }
  .close-detail:hover { background:rgba(0,0,0,.75); }

  /* PAGINATION */
  .pagination { padding:0 24px 24px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .page-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:6px 14px; cursor:pointer; font-size:13px; transition:all .15s; }
  .page-btn:hover:not(:disabled) { border-color:var(--text-muted); color:var(--text); }
  .page-btn:disabled { opacity:.35; cursor:not-allowed; }
  .page-info { font-size:12px; color:var(--text-muted); padding:0 8px; }
  .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); }
  .empty-state p { margin-top:12px; font-size:13px; }
  #loadingMsg { text-align:center; padding:80px 20px; color:var(--text-muted); font-size:14px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <path fill="#f33" d="M3.4,11.62c-.75,0-1.49-.28-2.06-.85C.2,9.63.2,7.79,1.34,6.65,9.42-1.43,22.58-1.43,30.66,6.65c1.14,1.14,1.14,2.98,0,4.12-1.14,1.14-2.99,1.14-4.12,0-5.81-5.81-15.26-5.81-21.07,0-.57.57-1.31.85-2.06.85Z"/>
      <path fill="#f90" d="M25,18.29c-.75,0-1.49-.28-2.06-.85-1.85-1.85-4.32-2.87-6.94-2.87s-5.08,1.02-6.94,2.87c-1.14,1.14-2.98,1.14-4.12,0s-1.14-2.98,0-4.12c2.95-2.95,6.88-4.58,11.06-4.58s8.1,1.63,11.06,4.58c1.14,1.14,1.14,2.98,0,4.12-.57.57-1.31.85-2.06.85Z"/>
      <path fill="#4d4" d="M21.4,24.65c-.75,0-1.49-.29-2.06-.85-1.84-1.84-4.83-1.84-6.67,0-1.14,1.14-2.98,1.14-4.12,0-1.14-1.14-1.14-2.98,0-4.12,1.99-1.99,4.64-3.09,7.46-3.09s5.47,1.1,7.46,3.09c1.14,1.14,1.14,2.98,0,4.12-.57.57-1.32.85-2.06.85Z"/>
      <path fill="#39f" d="M17.8,31.18c-.64,0-1.27-.21-1.8-.62-1.14.9-2.81.82-3.86-.23-1.14-1.14-1.14-2.98,0-4.12,2.13-2.13,5.59-2.13,7.72,0,1.14,1.14,1.14,2.98,0,4.12-.57.57-1.32.86-2.06.86Z"/>
    </svg>
    <div class="logo-text">Color Names</div>
  </div>
  <span class="stat-pill" id="totalStat"><span style="color:#fff">+30 K</span> <span style="color:#FF3333">C</span><span style="color:#FF9900">O</span><span style="color:#FFDD00">L</span><span style="color:#44DD44">O</span><span style="color:#3399FF">R</span><span style="color:#AA44FF">S</span></span>
</header>

<div id="main">
<div class="controls">

  <!-- Row 1: search + sort -->
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="search-wrap" style="flex:1;">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder='Search by name, e.g. "midnight blue"…' autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn">
        <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="hue">Hue</option>
      <option value="name">Name A–Z</option>
      <option value="lightness">Lightness</option>
    </select>
  </div>

  <!-- Row 2: wheel + filters -->
  <div class="filters-row">

    <!-- Picker panel -->
    <div class="picker-panel">
      <div class="picker-top">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;">
          <div id="pickerPreview"></div>
          <span id="pickerHexInput" style="font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:#fff;font-weight:500;">#FF0000</span>
        </div>
        <div class="picker-sliders">
          <div class="slider-group">
            <input type="range" class="hwb-slider" id="hueSlider" min="0" max="360" value="0">
            <span class="slider-num" id="hueVal">0</span>
          </div>
          <div class="slider-group">
            <input type="range" class="hwb-slider" id="satSlider" min="0" max="100" value="100">
            <span class="slider-num" id="satVal">100</span>
          </div>
          <div class="slider-group">
            <input type="range" class="hwb-slider" id="lightnessSlider" min="0" max="100" value="50">
            <span class="slider-num" id="lightnessVal">50</span>
          </div>
          <div class="slider-group">
            <input type="range" class="hwb-slider" id="rangeSlider" min="0" max="10" value="5" step="1">
            <span class="slider-num" id="rangeVal">5%</span>
          </div>
        </div>
      </div>
    </div>


  </div>
</div>

<div class="results-bar">
  <div class="results-count" id="resultsCount">Loading…</div>
</div>

<div id="grid"><div id="loadingMsg">Loading 30 000+ colors…</div></div>
<div class="pagination" id="pagination" style="display:none"></div>
</div><!-- /#main -->

<!-- DETAIL PANEL -->
<div id="detailPanel">
  <!-- desktop: top swatch -->
  <div class="detail-swatch" id="detailSwatch"></div>
  <!-- mobile: left column -->
  <div class="detail-left-col">
    <div class="detail-swatch-mobile" id="detailSwatchMobile"></div>
    <button class="copy-hex-btn-mobile" id="copyHexBtnMobile">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none"><rect x="1" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H10.5A1.5 1.5 0 0112 2.5v5A1.5 1.5 0 0110.5 9H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Copy HEX
    </button>
  </div>
  <button class="close-detail" id="closeDetail">
    <svg width="12" height="12" viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="1" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
  <div class="detail-content detail-content-mobile">
    <div class="detail-name" id="detailName"></div>
    <div class="detail-name-es" id="detailNameEs" style="display:none"></div>
    <div class="detail-section-label">Color Values</div>
    <div class="detail-values-grid">
      <div class="detail-value-row"><span class="detail-val-label">HEX</span><span class="detail-val-data hex-val" id="dHex"></span></div>
      <div class="detail-value-row"><span class="detail-val-label">RGB</span><span class="detail-val-data" id="dRgb"></span></div>
      <div class="detail-value-row"><span class="detail-val-label">CMYK</span><span class="detail-val-data" id="dCmyk"></span></div>
      <div class="detail-value-row"><span class="detail-val-label">HSL</span><span class="detail-val-data" id="dHsl"></span></div>
    </div>
    <button class="copy-hex-btn" id="copyHexBtn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H10.5A1.5 1.5 0 0112 2.5v5A1.5 1.5 0 0110.5 9H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Copy HEX
    </button>
  </div>
</div>

function hexToRgb(hex){ const h=hex.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase(); }
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}
function hslToRgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l);
  const f=n=>Math.round((l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))))*255);
  return [f(0),f(8),f(4)];
}
function rgbToCmyk(r,g,b){
  r/=255;g/=255;b/=255;
  const k=1-Math.max(r,g,b);
  if(k===1)return[0,0,0,100];
  return[Math.round((1-r-k)/(1-k)*100),Math.round((1-g-k)/(1-k)*100),Math.round((1-b-k)/(1-k)*100),Math.round(k*100)];
}
function colorDist(r1,g1,b1,r2,g2,b2){
  const dr=r1-r2,dg=g1-g2,db=b1-b2;
  return 2*dr*dr+4*dg*dg+3*db*db;
}

let allColors=[],currentQuery='',currentPage=0,currentSort='hue',filtered=[];
let pickerMode=true,pickerRgb=[255,0,0];

function init(){
  allColors=RAW.filter(([name])=>name).map(([name,hex])=>{
    const [r,g,b]=hexToRgb(hex);
    const [h,s,l]=rgbToHsl(r,g,b);
    return{name,hex,r,g,b,h,s,l,nameL:name.toLowerCase()};
  });
  document.getElementById('loadingMsg').remove();
  syncPickerFromHSL();
  render();
}

function applyFilters(){
  if(pickerMode){
    const dH=pickerRange*3.6, dS=pickerRange, dL=pickerRange;
    filtered=allColors.filter(c=>{
      const hd=Math.min(Math.abs(c.h-pickerH),360-Math.abs(c.h-pickerH));
      return hd<=dH && Math.abs(c.s-pickerS)<=dS && Math.abs(c.l-pickerL)<=dL;
    });
    filtered.sort((a,b)=>{
      const ha=Math.min(Math.abs(a.h-pickerH),360-Math.abs(a.h-pickerH));
      const hb=Math.min(Math.abs(b.h-pickerH),360-Math.abs(b.h-pickerH));
      return (ha+Math.abs(a.s-pickerS)+Math.abs(a.l-pickerL))-(hb+Math.abs(b.s-pickerS)+Math.abs(b.l-pickerL));
    });
  } else {
    const q=currentQuery.trim().toLowerCase();
    filtered=allColors.filter(c=>{
                  if(q&&!c.nameL.includes(q))return false;
      return true;
    });
  }
  if(currentSort==='name')filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else if(currentSort==='hue')filtered.sort((a,b)=>a.h-b.h||a.l-b.l);
  else if(currentSort==='lightness')filtered.sort((a,b)=>a.l-b.l);
}

function render(){
  applyFilters();
  const total=filtered.length,totalPages=Math.ceil(total/PAGE_SIZE);
  if(currentPage>=totalPages)currentPage=Math.max(0,totalPages-1);
  const slice=filtered.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  document.getElementById('resultsCount').innerHTML=
    `<span>${total.toLocaleString()}</span> color${total!==1?'s':''}${pickerMode?' closest matches':' found'}`+
    (totalPages>1?` — page <span>${currentPage+1}</span> of <span>${totalPages}</span>`:'');
  if(!slice.length){
    grid.innerHTML=`<div class="empty-state"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity=".3"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="26" x2="27" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="15" cy="16" r="2" fill="currentColor"/><circle cx="25" cy="16" r="2" fill="currentColor"/></svg><p>No colors match.</p></div>`;
  } else {
    const frag=document.createDocumentFragment();
    slice.forEach((c,i)=>{
      const card=document.createElement('div');
      card.className='color-card';
      card.innerHTML=`
        <div class="swatch" style="background:${c.hex}">
          ${pickerMode?`<span class="dist-badge">#${currentPage*PAGE_SIZE+i+1}</span>`:''}
        </div>
        <div class="card-body">
          <div class="color-name" title="${c.name}">${c.name}</div>
          <div class="color-hex">${c.hex}</div>
        </div>`;
      card.addEventListener('click',()=>openDetail(c));
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages){
  const pag=document.getElementById('pagination');
  if(totalPages<=1){pag.style.display='none';return;}
  pag.style.display='flex';
  pag.innerHTML=`
    <button class="page-btn" id="prevBtn" ${currentPage===0?'disabled':''}>
      <svg width="14" height="14" viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="page-info">Page ${currentPage+1} / ${totalPages}</span>
    <button class="page-btn" id="nextBtn" ${currentPage>=totalPages-1?'disabled':''}>
      <svg width="14" height="14" viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>`;
  document.getElementById('prevBtn').onclick=()=>{currentPage--;render();window.scrollTo(0,0);};
  document.getElementById('nextBtn').onclick=()=>{currentPage++;render();window.scrollTo(0,0);};
}

function translateEs(name){
  // Normalize: hyphens → spaces for easier phrase matching
  let s=name.toLowerCase().replace(/[-]/g,' ');
  // Replace known phrases (longest first)
  const sorted=Object.keys(PHRASES_ES).sort((a,b)=>b.length-a.length);
  for(const ph of sorted){
    const escaped=ph.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('\\b'+escaped+'\\b','gi');
    s=s.replace(re,'\x00'+PHRASES_ES[ph]+'\x00');
  }
  // Split on spaces/apostrophes keeping \x00 segments intact
  const parts=s.split(/[\s'']+/);
  const out=[];
  let inPhrase=false,phraseAcc='';
  for(const p of parts){
    if(!p)continue;
    if(p.startsWith('\x00')&&p.endsWith('\x00')){out.push(p.slice(1,-1));continue;}
    if(p.startsWith('\x00')){inPhrase=true;phraseAcc=p.slice(1);continue;}
    if(inPhrase){phraseAcc+=' '+p;if(p.endsWith('\x00')){out.push(phraseAcc.slice(0,-1));inPhrase=false;phraseAcc='';}continue;}
    const k=p.replace(/[^a-z]/g,'');
    if(k in WORDS_ES){if(WORDS_ES[k]!=='')out.push(WORDS_ES[k]);}
    else if(p.trim())out.push(p);
  }
  // Fix Spanish word order: [modifier/noun] [color] → [color] [modifier/noun]
  // In Spanish: "Dark Blue"→"Azul oscuro", "Saffron Orange"→"Naranja azafrán"
  const BASIC_COLORS=new Set([
    'azul','rojo','verde','amarillo','naranja','morado','rosa','marrón','gris',
    'negro','blanco','violeta','índigo','turquesa','carmesí','escarlata','coral',
    'salmón','magenta','fucsia','lavanda','lila','cian','lima',
    'dorado','plateado','ámbar','bronce','cobre','oro','plata',
  ]);
  // Broader set: color words + common nouns that swap with adjectives
  const ALL_COLORS=new Set([
    ...BASIC_COLORS,
    'ámbar','cobre','bronce','plateado','marfil','crema','ciruela','cereza','vino',
    'uva','limón','albaricoque','esmeralda','rubí','zafiro','jade','perla','ópalo',
    'topacio','diamante','menta','oliva','malva','pardo','beige','ocre','siena',
    'sepia','frambuesa','durazno','moca','chocolate','caramelo','fresa','melocotón',
    // Nature / abstract nouns that take adjectives after in Spanish
    'noche','niebla','neblina','bruma','bosque','selva','jardín','magia','cielo',
    'lago','océano','mar','sueño','paraíso','fuego','luna','sol','estrella',
    'galaxia','espacio','tierra','pradera','arena','piedra','montaña','isla',
    'tormenta','lluvia','nieve','hielo','escarcha','viento','brisa','polvo',
    'ceniza','humo','llama','cristal','seda','sangre','luz','sombra','destello',
    'corazón','alma','amor','paz','maravilla','aurora','misterio','eternidad',
    'ciudad','pueblo','camino','sendero','campo','valle','horizonte','orilla',
    'brillo','resplandor','espectro','fantasma','hada','sirena','dragón',
    'autopista','carretera','federación','reino','imperio','civilización',
    'montañas','estrellas','colinas','bosques','jardines','aguas','nubes',
  ]);
  // Feminine nouns (for adjective gender agreement)
  const FEM_NOUNS=new Set([
    // Singular feminine
    'noche','niebla','neblina','bruma','selva','magia','luna','galaxia','estrella',
    'tierra','pradera','arena','piedra','montaña','isla','tormenta','lluvia',
    'nieve','escarcha','brisa','ceniza','llama','seda','sangre','luz','sombra',
    'aurora','ciudad','orilla','eternidad','paz','maravilla','alma','sirena','hada',
    'autopista','federación','civilización','dinastía',
    'lavanda','lila','crema','ciruela','cereza','uva','frambuesa','esmeralda',
    'turquesa','fucsia','naranja','rosa','oliva','malva','lima',
    // Plural feminine (for plural noun + adjective agreement)
    'montañas','islas','estrellas','colinas','nubes','llamas','aguas','flores',
    'hojas','noches','nieblas','praderas','arenas','piedras','tormentas',
    'galaxias','selvas','sombras','cenizas','brisas',
  ]);
  // General adjectives that should follow their noun
  const ADJECTIVES=new Set([
    'oscuro','claro','profundo','pálido','brillante','vívido','apagado','cálido',
    'fresco','caliente','frío','puro','rico','eléctrico','real','imperial','neón',
    'ardiente','luminoso','reluciente','galáctico','vibrante','etéreo','radiante',
    'majestuoso','opulento','tormentoso','escarchado','cremoso','neblinoso',
    'congelado','saturado','pastel','intenso','mate','metálico','cósmico',
    'lunar','solar','sonrosado','exuberante','prístino','frondoso','salvaje',
    'misterioso','encantado','antiguo','herbal','botánico','homeopático',
    'tropical','ártico','oceánico','galáctico','intergaláctico','nocturno',
    'romántico','delicado','silencioso','sereno','dulce','amargo','polvo',
    'volcánico','místico','eléctrico','eterno','infinito','celestial','divino','eterno',
    'infinito','oceánico','glacial','estelar','nocturno','perpetuo','sublime',
    'sagrado','iridiscente','luminoso','vintage','exótico','rústico',
  ]);
  let finalOut=out.slice();
  if(finalOut.length===2&&!finalOut[0].includes(' ')&&!finalOut[1].includes(' ')){
    const [a,b]=[finalOut[0].toLowerCase(),finalOut[1].toLowerCase()];
    // Rule 1: [adj] [swappable-noun] → [noun] [adj with gender]
    if(ADJECTIVES.has(a)&&ALL_COLORS.has(b)){
      finalOut=[finalOut[1],finalOut[0]];
      // Gender agreement: feminine singular -o→-a, feminine plural -o→-as
      if(FEM_NOUNS.has(b)&&finalOut[1].match(/o$/)){
        const suf=b.endsWith('as')||b.endsWith('es')?'as':'a';
        finalOut[1]=finalOut[1].slice(0,-1)+suf;
      }
    }
    // Rule 2: [noun/fancy-color] [base-color] → [base-color] [noun/fancy-color]
    else if(!BASIC_COLORS.has(a)&&BASIC_COLORS.has(b)){
      finalOut=[finalOut[1],finalOut[0]];
    }
    // Rule 3: [base-color] [non-basic-swappable-noun] → [noun] [color]
    // e.g. "Silver Storm" → "Tormenta plateada"
    else if(BASIC_COLORS.has(a)&&ALL_COLORS.has(b)&&!BASIC_COLORS.has(b)){
      finalOut=[finalOut[1],finalOut[0]];
      if(FEM_NOUNS.has(b)&&finalOut[1].match(/o$/)){
        const suf=b.endsWith('as')||b.endsWith('es')?'as':'a';
        finalOut[1]=finalOut[1].slice(0,-1)+suf;
      }
    }
  }else if(finalOut.length===3&&finalOut.every(t=>!t.includes(' '))){
    const [a,b,c]=[finalOut[0].toLowerCase(),finalOut[1].toLowerCase(),finalOut[2].toLowerCase()];
    if(ALL_COLORS.has(c)&&ADJECTIVES.has(a)){
      finalOut=[finalOut[2],finalOut[0],finalOut[1]];
      if(FEM_NOUNS.has(c)&&finalOut[1].match(/o$/)){
        const suf=c.endsWith('as')||c.endsWith('es')?'as':'a';
        finalOut[1]=finalOut[1].slice(0,-1)+suf;
      }
    }
  }
  const r=finalOut.join(' ').trim();
  return r?r.charAt(0).toUpperCase()+r.slice(1):name;
}

function openDetail(c){
  const [cc,cm,cy,ck]=rgbToCmyk(c.r,c.g,c.b);
  document.getElementById('detailSwatch').style.background=c.hex;
  document.getElementById('detailSwatchMobile').style.background=c.hex;
  document.getElementById('detailName').textContent=c.name;
  document.getElementById('detailNameEs').textContent=translateEs(c.name);
  document.getElementById('dHex').textContent=c.hex;
  document.getElementById('dRgb').textContent=`${c.r}, ${c.g}, ${c.b}`;
  document.getElementById('dCmyk').textContent=`${cc}%, ${cm}%, ${cy}%, ${ck}%`;
  document.getElementById('dHsl').textContent=`${c.h}°, ${c.s}%, ${c.l}%`;
  // wire copy buttons
  function doCopy(btn,cls){
    navigator.clipboard.writeText(c.hex).then(()=>{
      const orig=btn.innerHTML; btn.className=cls+' copied';
      setTimeout(()=>{btn.innerHTML=orig;btn.className=cls;},1500);
    });
  }
  const btn=document.getElementById('copyHexBtn');
  btn.className='copy-hex-btn';
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H10.5A1.5 1.5 0 0112 2.5v5A1.5 1.5 0 0110.5 9H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> Copy HEX`;
  btn.onclick=()=>doCopy(btn,'copy-hex-btn');
  const mBtn=document.getElementById('copyHexBtnMobile');
  mBtn.className='copy-hex-btn-mobile';
  mBtn.onclick=()=>doCopy(mBtn,'copy-hex-btn-mobile');
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('main').classList.add('panel-open');
}

// ===== HWB SLIDERS =====
let pickerH=0, pickerS=100, pickerL=50, pickerRange=5;

function hwbToRgb(h,w,b){
  w/=100;b/=100;
  if(w+b>=1){const g=Math.round(w/(w+b)*255);return[g,g,g];}
  const [r,g,bl]=hslToRgb(h,100,50);
  return[
    Math.round((r/255*(1-w-b)+w)*255),
    Math.round((g/255*(1-w-b)+w)*255),
    Math.round((bl/255*(1-w-b)+w)*255),
  ];
}

function rgbToHwb(r,g,b){
  const w=Math.min(r,g,b)/255;
  const bk=1-Math.max(r,g,b)/255;
  const [h]=rgbToHsl(r,g,b);
  return[h,Math.round(w*100),Math.round(bk*100)];
}

function updateSliderGradients(){
  document.getElementById('hueSlider').style.background=
    'linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)';
  const pure=hslToRgb(pickerH,100,50);
  document.getElementById('satSlider').style.background=
    `linear-gradient(to right,hsl(0,0%,${pickerL}%),rgb(${pure}))`;
  document.getElementById('lightnessSlider').style.background=
    `linear-gradient(to right,#000,rgb(${pure}),#fff)`;
}

function syncPickerFromHSL(){
  const [r,g,b]=hslToRgb(pickerH,pickerS,pickerL);
  const hex=rgbToHex(r,g,b);
  document.getElementById('pickerPreview').style.background=hex;
  document.getElementById('pickerHexInput').textContent=hex;
  document.getElementById('hueVal').textContent=Math.round(pickerH);
  document.getElementById('satVal').textContent=Math.round(pickerS);
  document.getElementById('lightnessVal').textContent=Math.round(pickerL);
  updateSliderGradients();
  pickerRgb=[r,g,b];
  if(pickerMode){
    clearTimeout(pickerDebounce);
    pickerDebounce=setTimeout(()=>{currentPage=0;render();},120);
  }
}

let pickerDebounce;
document.getElementById('hueSlider').addEventListener('input',function(){pickerH=+this.value;pickerMode=true;searchInput.value='';currentQuery='';clearBtn.classList.remove('visible');syncPickerFromHSL();});
document.getElementById('satSlider').addEventListener('input',function(){pickerS=+this.value;pickerMode=true;searchInput.value='';currentQuery='';clearBtn.classList.remove('visible');syncPickerFromHSL();});
document.getElementById('lightnessSlider').addEventListener('input',function(){pickerL=+this.value;pickerMode=true;searchInput.value='';currentQuery='';clearBtn.classList.remove('visible');syncPickerFromHSL();});
document.getElementById('rangeSlider').addEventListener('input',function(){pickerRange=+this.value;document.getElementById('rangeVal').textContent=pickerRange+'%';currentPage=0;render();});
